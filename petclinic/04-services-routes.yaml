# ── Services（叢集內 DNS 服務發現）────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: petclinic
  labels:
    app: config-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: config-server
  ports:
  - port: 8888
    targetPort: 8888
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-server
  namespace: petclinic
  labels:
    app: discovery-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: discovery-server
  ports:
  - port: 8761
    targetPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: customers-service
  namespace: petclinic
  labels:
    app: customers-service
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: customers-service
  ports:
  - port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: vets-service
  namespace: petclinic
  labels:
    app: vets-service
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: vets-service
  ports:
  - port: 8083
    targetPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: visits-service
  namespace: petclinic
  labels:
    app: visits-service
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: visits-service
  ports:
  - port: 8082
    targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: petclinic
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: admin-server
  namespace: petclinic
  labels:
    app: admin-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  selector:
    app: admin-server
  ports:
  - port: 9090
    targetPort: 9090
---
# ── Routes（對外公開）─────────────────────────────────────
# API Gateway：PetClinic 主入口
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: petclinic
  namespace: petclinic
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: spring-petclinic
spec:
  host: petclinic.apps-crc.testing
  to:
    kind: Service
    name: api-gateway
  port:
    targetPort: 8080
---
# Admin Server：Spring Boot Admin 管理介面
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: petclinic-admin
  namespace: petclinic
  labels:
    app: admin-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  host: petclinic-admin.apps-crc.testing
  to:
    kind: Service
    name: admin-server
  port:
    targetPort: 9090
---
# Discovery Server（Eureka）：服務註冊中心 UI
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: petclinic-discovery
  namespace: petclinic
  labels:
    app: discovery-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  host: petclinic-discovery.apps-crc.testing
  to:
    kind: Service
    name: discovery-server
  port:
    targetPort: 8761
