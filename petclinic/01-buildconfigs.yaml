# ============================================================
# Spring PetClinic Microservices — S2I BuildConfig 定義
# 每個服務從 GitHub 原始碼透過 S2I (ubi8-openjdk-17) 建置
# ============================================================

# --- config-server ---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: config-server
  namespace: petclinic
  labels:
    app: config-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  source:
    type: Git
    git:
      uri: https://github.com/spring-petclinic/spring-petclinic-microservices.git
      ref: main
  strategy:
    type: Source
    sourceStrategy:
      from:
        kind: ImageStreamTag
        namespace: openshift
        name: ubi8-openjdk-17:latest
      env:
        - name: MAVEN_ARGS
          value: "package -pl spring-petclinic-config-server -am -DskipTests"
        - name: ARTIFACT_DIR
          value: "spring-petclinic-config-server/target"
  output:
    to:
      kind: ImageStreamTag
      name: config-server:latest
---
