# ============================================================
# Spring PetClinic Microservices — Deployment 定義
# BestEffort QoS（不設 requests）適用於資源受限的學習環境
# 啟動順序：config-server → discovery-server → 業務服務
# ============================================================

# ── 1. Config Server ──────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic
  labels:
    app: config-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
      - name: config-server
        image: image-registry.openshift-image-registry.svc:5000/petclinic/config-server:latest
        ports:
        - containerPort: 8888
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: JAVA_OPTS
          value: "-Xms64m -Xmx256m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 15
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8888
          initialDelaySeconds: 120
          periodSeconds: 20
---
# ── 2. Discovery Server ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: petclinic
  labels:
    app: discovery-server
    app.kubernetes.io/part-of: spring-petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-server
  template:
    metadata:
      labels:
        app: discovery-server
    spec:
      initContainers:
      - name: wait-config
        image: busybox:1.36
        command: ['sh','-c','until wget -qO- http://config-server:8888/actuator/health 2>/dev/null | grep -q UP; do sleep 8; done']
      containers:
      - name: discovery-server
        image: image-registry.openshift-image-registry.svc:5000/petclinic/discovery-server:latest
        ports:
        - containerPort: 8761
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: JAVA_OPTS
          value: "-Xms64m -Xmx256m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 15
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8761
          initialDelaySeconds: 120
          periodSeconds: 20
---
