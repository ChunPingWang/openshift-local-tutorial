# ============================================================
# Keycloak — OAuth2/OIDC 認證中心（Istio 版）
# 與 Spring Cloud 版的差異：
#   Spring Cloud：API Gateway 用 Spring Security 程式碼驗證 JWT
#   Istio：       RequestAuthentication 在 mesh 層驗證 JWT（零程式碼）
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: security
  labels:
    app.kubernetes.io/part-of: petclinic-istio-security
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: security
data:
  petclinic-realm.json: |
    {
      "realm": "petclinic",
      "enabled": true,
      "displayName": "Spring PetClinic (Istio)",
      "sslRequired": "none",
      "clients": [
        {
          "clientId": "petclinic-istio",
          "name": "PetClinic Istio Gateway",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": ["http://petclinic.apps-crc.testing/*"],
          "webOrigins": ["*"],
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "access.token.claim": "true",
                "claim.name": "roles",
                "multivalued": "true"
              }
            }
          ]
        }
      ],
      "roles": {
        "realm": [
          {"name": "user", "description": "一般使用者"},
          {"name": "vet", "description": "獸醫"},
          {"name": "admin", "description": "管理員"}
        ]
      },
      "users": [
        {
          "username": "alice",
          "email": "alice@petclinic.local",
          "enabled": true,
          "credentials": [{"type": "password", "value": "alice123", "temporary": false}],
          "realmRoles": ["user"]
        },
        {
          "username": "bob",
          "email": "bob@petclinic.local",
          "enabled": true,
          "credentials": [{"type": "password", "value": "bob123", "temporary": false}],
          "realmRoles": ["vet"]
        },
        {
          "username": "admin",
          "email": "admin@petclinic.local",
          "enabled": true,
          "credentials": [{"type": "password", "value": "admin123", "temporary": false}],
          "realmRoles": ["admin", "user", "vet"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: security
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0.4
        args: [start-dev, --import-realm]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin123"
        - name: KC_PROXY
          value: "edge"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: JAVA_OPTS_APPEND
          value: "-Xms128m -Xmx512m"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: realm-config
          mountPath: /opt/keycloak/data/import
        readinessProbe:
          httpGet:
            path: /realms/petclinic
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
          failureThreshold: 10
      volumes:
      - name: realm-config
        configMap:
          name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: security
spec:
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: security
spec:
  host: keycloak.apps-crc.testing
  to:
    kind: Service
    name: keycloak
  port:
    targetPort: 8080
