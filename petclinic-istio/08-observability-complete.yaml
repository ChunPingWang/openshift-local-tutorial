# ============================================================
# Istio 可觀測性補強：AlertManager + Promtail + Istio 告警規則
#
# 補齊三大支柱的缺口：
#   Metrics：Prometheus（已有）+ AlertManager（本檔新增）
#   Logs：  Loki（addons 已有）+ Promtail（本檔新增）
#   Traces：Jaeger（已有）
#
# 對照 Spring Cloud 分支：改用 Istio 原生 metrics 做告警
#   （istio_requests_total / istio_request_duration_milliseconds）
# ============================================================

# ── 1. AlertManager ───────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: istio-system
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'destination_service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default'
      routes:
      - match:
          severity: critical
        receiver: 'critical'
    receivers:
    - name: 'default'
      webhook_configs:
      - url: 'http://localhost:5001/'
        send_resolved: true
    - name: 'critical'
      webhook_configs:
      - url: 'http://localhost:5001/critical'
        send_resolved: true
    inhibit_rules:
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'destination_service']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: istio-system
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --web.external-url=http://alertmanager-istio.apps-crc.testing
        ports:
        - containerPort: 9093
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 10
      volumes:
      - name: config
        configMap:
          name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: istio-system
spec:
  selector:
    app: alertmanager
  ports:
  - port: 9093
    targetPort: 9093
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: alertmanager-istio
  namespace: istio-system
spec:
  host: alertmanager-istio.apps-crc.testing
  to:
    kind: Service
    name: alertmanager
  port:
    targetPort: 9093
---
# ── 2. Prometheus 告警規則（基於 Istio 原生 metrics）──────
apiVersion: v1
kind: ConfigMap
metadata:
  name: istio-alert-rules
  namespace: istio-system
data:
  istio-alerts.yaml: |
    groups:
    - name: istio-petclinic
      rules:
      # 高 5xx 錯誤率（Istio mesh 層觀測，無需應用埋點）
      - alert: IstioHighErrorRate
        expr: |
          sum(rate(istio_requests_total{response_code=~"5.."}[5m])) by (destination_service_name)
          /
          sum(rate(istio_requests_total[5m])) by (destination_service_name)
          > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.destination_service_name }} 5xx 錯誤率 > 5%"

      # 高請求延遲（P99 > 1s）
      - alert: IstioHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(istio_request_duration_milliseconds_bucket[5m]))
            by (destination_service_name, le)
          ) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.destination_service_name }} P99 延遲 > 1s"

      # 服務無流量（可能下線）
      - alert: IstioServiceNoTraffic
        expr: |
          sum(rate(istio_requests_total[5m])) by (destination_service_name) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.destination_service_name }} 5 分鐘無流量"

      # mTLS 連線失敗
      - alert: IstioMutualTLSError
        expr: |
          sum(rate(istio_requests_total{connection_security_policy!="mutual_tls",
            destination_service_namespace="petclinic"}[5m])) by (destination_service_name) > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.destination_service_name }} 出現非 mTLS 連線"
---
# ── 3. Promtail — 日誌收集（Loki 已由 addons 部署）────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: istio-system
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki.istio-system.svc.cluster.local:3100/loki/api/v1/push
    scrape_configs:
    - job_name: kubernetes-pods
      pipeline_stages:
      - cri: {}
      # 解析 Istio Envoy access log（JSON 格式）
      - match:
          selector: '{container="istio-proxy"}'
          stages:
          - json:
              expressions:
                method: method
                path: path
                response_code: response_code
                duration: duration
          - labels:
              method:
              response_code:
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_namespace]
        action: keep
        regex: petclinic|istio-system|security
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: app
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_container_name]
        target_label: container
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
        - __meta_kubernetes_pod_uid
        - __meta_kubernetes_pod_container_name
        target_label: __path__
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: istio-system
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: promtail
        image: grafana/promtail:2.9.6
        args:
        - -config.file=/etc/promtail/promtail.yaml
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlog
          mountPath: /var/log
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlog
        hostPath:
          path: /var/log
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: istio-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-istio
rules:
- apiGroups: [""]
  resources: [nodes, nodes/proxy, services, endpoints, pods]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-istio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-istio
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: istio-system
---
# ── 4. Loki Route（Istio addons 的 Loki 對外存取）────────
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: loki-istio
  namespace: istio-system
spec:
  host: loki-istio.apps-crc.testing
  to:
    kind: Service
    name: loki
  port:
    targetPort: http-metrics
